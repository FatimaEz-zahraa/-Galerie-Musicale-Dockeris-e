<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Musiques Deezer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #f8fafc;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 48px;
            width: 100%;
            max-width: 1400px;
            box-shadow: 
                0 32px 64px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.05) 50%, transparent 70%);
            pointer-events: none;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6 0%, #a855f7 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        header p {
            font-size: 1.25rem;
            color: rgba(248, 250, 252, 0.8);
            font-weight: 400;
        }

        .track-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 32px;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        @media (max-width: 768px) {
            .track-list {
                grid-template-columns: 1fr;
                gap: 24px;
            }
        }

        .track-item {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 32px 24px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            height: 420px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease forwards;
        }

        .track-item:nth-child(1) { animation-delay: 0.1s; }
        .track-item:nth-child(2) { animation-delay: 0.2s; }
        .track-item:nth-child(3) { animation-delay: 0.3s; }
        .track-item:nth-child(4) { animation-delay: 0.4s; }
        .track-item:nth-child(5) { animation-delay: 0.5s; }
        .track-item:nth-child(6) { animation-delay: 0.6s; }
        .track-item:nth-child(7) { animation-delay: 0.7s; }
        .track-item:nth-child(8) { animation-delay: 0.8s; }
        .track-item:nth-child(9) { animation-delay: 0.9s; }
        .track-item:nth-child(10) { animation-delay: 1s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .track-item:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 
                0 32px 64px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.15);
        }

        .rank {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            color: #10b981;
            font-size: 1.25rem;
            font-weight: 700;
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(16, 185, 129, 0.3);
            transition: all 0.3s ease;
        }

        .track-item:hover .rank {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            transform: scale(1.1);
            color: #ffffff;
        }

        .track-cover {
            width: 160px;
            height: 160px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s ease;
        }

        .track-item:hover .track-cover {
            transform: scale(1.08) rotate(2deg);
            border-color: rgba(59, 130, 246, 0.8);
            box-shadow: 0 30px 60px rgba(59, 130, 246, 0.3);
        }

        .track-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
        }

        .track-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
            line-height: 1.3;
            max-height: 3.6em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .track-artist {
            font-size: 1.125rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 400;
        }

        .play-icon {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            opacity: 0;
            transform: scale(0.5) translateY(10px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 12px 32px rgba(16, 185, 129, 0.4);
        }

        .track-item:hover .play-icon {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        footer {
            margin-top: 64px;
            text-align: center;
        }

        button {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 16px;
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 12px 32px rgba(59, 130, 246, 0.4);
            letter-spacing: 0.025em;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 48px rgba(59, 130, 246, 0.5);
            background: linear-gradient(135deg, #2563eb, #1e40af);
        }

        button:active {
            transform: translateY(-2px);
        }

        #playing-status {
            margin-top: 20px;
            font-size: 1rem;
            font-weight: 500;
            color: #10b981;
            min-height: 24px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #playing-status.show {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🎵 Top 10 Deezer</h1>
            <p>Propulsé par MongoDB & Docker</p>
        </header>
        <main>
            <ul class="track-list">
                <!-- Les musiques seront injectées dynamiquement ici par le serveur Node.js -->
                {{TRACK_LIST}}
            </ul>
        </main>
        <footer>
            <button onclick="window.location.reload()">Rafraîchir la Liste</button>
            <div id="playing-status"></div>
        </footer>
    </div>

    <script>
        // Minuscule script client juste pour gérer le clic lecteur audio (sans interroger l'API)
        let currentAudio = null;

        function playPreview(url) {
            if (currentAudio) {
                currentAudio.pause();
            }
            if (url && url !== 'null') {
                currentAudio = new Audio(url);
                currentAudio.play();
                document.getElementById('playing-status').innerText = "🔊 Lecture de l'extrait en cours...";

                currentAudio.onended = () => {
                    document.getElementById('playing-status').innerText = '';
                };
            } else {
                document.getElementById('playing-status').innerText = '❌ Aucun extrait disponible pour cette chanson.';
            }
        }
    </script>
</body>

</html>
